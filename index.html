<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D2B5E">
<title>Pedidos — Distribuidor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0D2B5E;--teal:#0E7C7B;--orange:#E65100;--wa:#25D366;--red:#C62828;
  --bg:#F4F6F9;--card:#fff;--text:#111;--text2:#666;--border:#E0E0E0;
  --input-bg:#fff;--chip-bg:#fff;--modal-bg:#fff;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#111;--card:#1E1E1E;--text:#F0F0F0;--text2:#999;--border:#333;--input-bg:#2A2A2A;--chip-bg:#2A2A2A;--modal-bg:#1E1E1E}
}
html,body{height:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--navy);padding:12px 14px 10px;position:sticky;top:0;z-index:100}
.topbar-row{display:flex;align-items:center;gap:8px}
.topbar h1{font-size:16px;font-weight:600;color:#fff;flex:1}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px}
.mode-wrap{display:flex;background:rgba(255,255,255,.15);border-radius:20px;padding:2px;gap:1px}
.mbtn{padding:4px 9px;border-radius:18px;font-size:11px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.7);border:none;background:transparent;transition:all .2s}
.mbtn.on{background:#fff;color:var(--navy)}
.badge{background:var(--orange);color:#fff;font-size:11px;font-weight:700;padding:4px 8px;border-radius:12px;min-width:26px;text-align:center;cursor:pointer}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:60px;z-index:99}
.tab{flex:1;padding:10px 4px 8px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;color:var(--text2);border-bottom:3px solid transparent;transition:all .15s;letter-spacing:.02em}
.tab.on{color:var(--navy);border-bottom-color:var(--navy)}
.tab svg{display:block;margin:0 auto 2px;width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.screen{display:none;padding:10px;flex:1}
.screen.on{display:block}
.sbox{position:relative;margin-bottom:8px}
.sbox svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sbox input{width:100%;padding:10px 10px 10px 36px;font-size:14px;border-radius:12px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);outline:none;-webkit-appearance:none}
.sbox input:focus{border-color:var(--teal)}
.chips{display:flex;gap:5px;overflow-x:auto;padding-bottom:7px;margin-bottom:8px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--chip-bg);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;user-select:none;-webkit-user-select:none}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.plist{display:flex;flex-direction:column;gap:5px}
.pc{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:10px 12px;display:flex;align-items:center;gap:8px;transition:border-color .15s}
.pc.sel{border:2px solid var(--teal);background:rgba(14,124,123,.04)}
.pinfo{flex:1;min-width:0;cursor:pointer}
.pname{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pmeta{font-size:11px;color:var(--text2);margin-top:1px}
.pprice{font-size:12px;color:var(--teal);font-weight:700;margin-top:2px}
.qctrl{display:flex;align-items:center;gap:4px;flex-shrink:0}
.qbtn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);font-size:20px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:300;-webkit-appearance:none;line-height:1}
.qbtn.add{background:var(--teal);border-color:var(--teal);color:#fff}
.qnum{font-size:14px;font-weight:700;min-width:22px;text-align:center;color:var(--navy)}
.stitle{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin:10px 0 6px 2px}
.fgrp{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:10px}
.fr{display:flex;align-items:center;padding:0 13px;border-bottom:1px solid var(--border);min-height:44px}
.fr:last-child{border-bottom:none}
.fl{font-size:12px;color:var(--text2);width:82px;flex-shrink:0;font-weight:500}
.fr input{flex:1;font-size:14px;border:none;background:transparent;color:var(--text);padding:10px 0;outline:none;-webkit-appearance:none}
.icard{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.ir{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border);gap:7px}
.ir:last-child{border-bottom:none}
.iname{flex:1;font-size:13px;color:var(--text);min-width:0;font-weight:500}
.iname span{display:block;font-size:11px;color:var(--text2);font-weight:400}
.iqty{font-size:12px;color:var(--text2);white-space:nowrap}
.isub{font-size:13px;font-weight:700;color:var(--navy);white-space:nowrap}
.idel{color:var(--text2);font-size:16px;padding:5px;cursor:pointer;line-height:1;flex-shrink:0}
.tbar{background:var(--navy);border-radius:12px;padding:12px 15px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.tbar-l span{color:rgba(255,255,255,.65);font-size:12px}
.tbar-l small{display:block;color:rgba(255,255,255,.5);font-size:11px;margin-top:1px}
.tbar strong{color:#fff;font-size:21px;font-weight:700}
.btn{width:100%;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:7px;-webkit-appearance:none;transition:opacity .15s}
.btn:active{opacity:.82}
.btn-teal{background:var(--teal);color:#fff}
.btn-wa{background:var(--wa);color:#fff}
.btn-navy{background:var(--navy);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-out{background:var(--card);color:var(--navy);border:2px solid var(--navy)}
.btn-gray{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:12px;text-align:center}
.kv{font-size:24px;font-weight:700;color:var(--navy)}
.kl{font-size:11px;color:var(--text2);margin-top:2px;font-weight:500}
.hcard{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:12px 14px;margin-bottom:8px}
.htop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.hcli{font-size:14px;font-weight:700;color:var(--text)}
.htot{font-size:15px;font-weight:700;color:var(--navy)}
.hmeta{font-size:11px;color:var(--text2);margin-top:1px}
.hbadge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(14,124,123,.12);color:var(--teal);margin-top:3px}
.hactions{display:flex;gap:5px;margin-top:9px}
.hbtn{flex:1;border:none;border-radius:9px;padding:9px 4px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;-webkit-appearance:none}
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.empty svg{width:44px;height:44px;stroke:var(--text2);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 10px;display:block;opacity:.35}
.empty p{font-size:13px;line-height:1.5}
.notice{background:rgba(14,124,123,.1);border-radius:10px;padding:8px 12px;font-size:12px;color:#085041;margin-bottom:9px;display:flex;align-items:center;gap:6px}
@media(prefers-color-scheme:dark){.notice{color:#5DCAA5}}
.nores{text-align:center;padding:28px;color:var(--text2);font-size:13px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:flex-end}
.ovc{background:var(--modal-bg);width:100%;max-width:480px;margin:0 auto;border-radius:20px 20px 0 0;padding:20px 16px 36px}
.ov-title{font-size:15px;font-weight:700;margin-bottom:4px;color:var(--text)}
.ov-sub{font-size:11px;color:var(--text2);margin-bottom:14px}
.ov-label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
.ov-inp{width:100%;font-size:18px;padding:12px;border-radius:12px;background:var(--input-bg);color:var(--text);margin-bottom:12px;outline:none;-webkit-appearance:none}
.ov-inp.main{border:2px solid var(--teal)}
.ov-inp.sec{border:1px solid var(--border);margin-bottom:14px}
.ov-cancel{width:100%;background:transparent;color:var(--text2);border:none;padding:10px;font-size:13px;cursor:pointer;margin-top:4px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;z-index:999;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap;font-weight:500}
.toast.show{opacity:1}
@media(prefers-color-scheme:dark){.toast{background:#E0E0E0;color:#111}}
</style>
</head>
<body>
<div class="app" id="app">

<div class="topbar">
  <div class="topbar-row">
    <div style="flex:1;min-width:0">
      <h1>Toma de Pedidos</h1>
      <div class="topbar-sub" id="topdate"></div>
    </div>
    <div class="mode-wrap">
      <button class="mbtn on" id="m-precio" onclick="setMode('precio')">Con precio</button>
      <button class="mbtn" id="m-sin" onclick="setMode('sin')">Sin precio</button>
    </div>
    <div class="badge" id="cbadge" onclick="goTab('pedido')">0</div>
  </div>
</div>

<div class="tabs">
  <div class="tab on" onclick="goTab('cat')" id="tab-cat">
    <svg viewBox="0 0 24 24"><rect x="2" y="3" width="7" height="7"/><rect x="15" y="3" width="7" height="7"/><rect x="15" y="15" width="7" height="7"/><rect x="2" y="15" width="7" height="7"/></svg>Catálogo
  </div>
  <div class="tab" onclick="goTab('pedido')" id="tab-pedido">
    <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="M9 12h6M9 16h4"/></svg>Pedido
  </div>
  <div class="tab" onclick="goTab('hist')" id="tab-hist">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Historial
  </div>
</div>

<!-- CATÁLOGO -->
<div class="screen on" id="sc-cat">
  <div class="sbox">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" id="sinp" placeholder="Buscar por nombre o código..." oninput="filterP()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>
  <div class="chips" id="chips"></div>
  <div class="plist" id="plist"></div>
</div>

<!-- PEDIDO -->
<div class="screen" id="sc-pedido">
  <div class="stitle">Datos del cliente</div>
  <div class="fgrp">
    <div class="fr"><span class="fl">Cliente</span><input type="text" id="f-cli" placeholder="Nombre completo..." autocomplete="off"></div>
    <div class="fr"><span class="fl">Cédula / RUC</span><input type="text" id="f-ruc" placeholder="10 dígitos" inputmode="numeric" maxlength="10" autocomplete="off" oninput="this.value=this.value.replace(/[^0-9]/g,'').substring(0,10)"></div>
    <div class="fr"><span class="fl">Dirección</span><input type="text" id="f-dir" placeholder="Calle / sector..." autocomplete="off"></div>
    <div class="fr"><span class="fl">Teléfono</span><input type="text" id="f-tel" placeholder="09..." inputmode="tel" autocomplete="off"></div>
  </div>
  <div class="stitle" id="ititle">Productos (0)</div>
  <div id="notice-sin" class="notice" style="display:none">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Modo sin precio — se envía solo la lista de cantidades
  </div>
  <div id="cbody"></div>
  <div class="empty" id="cempty">
    <svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    <p>Carrito vacío.<br>Ve al catálogo y agrega productos.</p>
  </div>
  <div id="cactions" style="display:none"></div>
  <button class="btn btn-out" onclick="goTab('cat')" style="margin-top:6px">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Agregar productos
  </button>
</div>

<!-- HISTORIAL -->
<div class="screen" id="sc-hist">
  <div class="kgrid" id="kgrid"></div>
  <div class="stitle">Pedidos del día</div>
  <div id="hlist"></div>
</div>

</div>
<div class="toast" id="toast"></div>

function renderChips(){

  el.innerHTML=allFams.map(f=>

  ).join("");

  });
}

    c.classList.toggle("on", c.dataset.fam===f);
  });
  filterP();
}

// ── FILTRO ─────────────────────────────────────────────────────────
function filterP(){
  const q=document.getElementById("sinp").value.toLowerCase().trim();
  const list=document.getElementById("plist");
  const filtered=PRODS.filter(p=>{
    const fok=actFam==="TODOS"||p[1]===actFam;
    const qok=!q||p[2].toLowerCase().includes(q)||p[0].includes(q);
    return fok&&qok;
  });
  if(!filtered.length){
    list.innerHTML='<div class="nores">Sin resultados para esa búsqueda</div>';
    return;
  }
  list.innerHTML=filtered.slice(0,80).map(p=>{
    const qty=cart[p[0]]||0;
    const pr=p[3]>0?p[3]:null;
    return `<div class="pc${qty>0?" sel":""}" id="pc-${p[0]}">
      <div class="pinfo" onclick="onProdTap('${p[0]}')">
        <div class="pname">${p[2]}</div>
        <div class="pmeta">${p[0]} · ${p[1]}</div>
        ${mode==="precio"?`<div class="pprice">$${(prices[p[0]]||pr||0).toFixed(2)}</div>`:""}
      </div>
      <div class="qctrl" id="qc-${p[0]}">
        ${qty>0?`<button class="qbtn" onclick="chgQ('${p[0]}',-1)">−</button><span class="qnum">${qty}</span>`:""}
        <button class="qbtn add" onclick="onAdd('${p[0]}')">+</button>
      </div>
    </div>`;
  }).join("");
  if(filtered.length>80)list.innerHTML+=`<div class="nores" style="padding:10px;font-size:11px">Mostrando 80 de ${filtered.length} — refina la búsqueda</div>`;
}

function onProdTap(code){
  if(mode==="sin"){addDirect(code);}
  else{showMod(code);}
}
function onAdd(code){
  if(mode==="sin"){addDirect(code);}
  else{chgQ(code,1);}
}

function addDirect(code){
  cart[code]=(cart[code]||0)+1;
  updBadge();refreshCard(code);
  toast("Agregado ✓");
}

function chgQ(code,delta){
  const cur=cart[code]||0,nq=Math.max(0,cur+delta);
  if(delta>0&&mode==="precio"&&!prices[code]){
    const prod=PRODS.find(p=>p[0]===code);
    if(prod&&prod[3]>0){prices[code]=prod[3];cart[code]=1;updBadge();refreshCard(code);toast("Agregado ✓");return;}
    showMod(code,1);return;
  }
  if(nq===0){delete cart[code];if(mode==="precio")delete prices[code];}
  else cart[code]=nq;
  updBadge();refreshCard(code);
}

function refreshCard(code){
  const ctrl=document.getElementById("qc-"+code);
  const card=document.getElementById("pc-"+code);
  if(!ctrl)return;
  const qty=cart[code]||0;
  if(card)card.classList.toggle("sel",qty>0);
  const sp=mode==="sin";
  ctrl.innerHTML=`${qty>0?`<button class="qbtn" onclick="chgQ('${code}',-1)">−</button><span class="qnum">${qty}</span>`:""}
    <button class="qbtn add" onclick="onAdd('${code}')">+</button>`;
}

function showMod(code,fd){
  pendCode=code;
  const prod=PRODS.find(p=>p[0]===code);
  const defP=prod&&prod[3]>0?prod[3]:"";
  const exP=prices[code]!==undefined?prices[code]:defP;
  const exQ=cart[code]||fd||1;
  const ov=document.createElement("div");ov.className="ov";ov.id="ov";
  ov.innerHTML=`<div class="ovc">
    <div class="ov-title">${prod?prod[2]:code}</div>
    <div class="ov-sub">Código: ${code}</div>
    <label class="ov-label">Precio unitario ($)</label>
    <input class="ov-inp main" id="p-inp" type="number" inputmode="decimal" step="0.01" placeholder="0.00" value="${exP}">
    <label class="ov-label">Cantidad</label>
    <input class="ov-inp sec" id="q-inp" type="number" inputmode="numeric" step="1" placeholder="1" value="${exQ}">
    <button class="btn btn-teal" onclick="confMod()">Confirmar</button>
    <button class="ov-cancel" onclick="closeOv()">Cancelar</button>
  </div>`;
  document.body.appendChild(ov);
  setTimeout(()=>document.getElementById("p-inp").focus(),80);
}
function confMod(){
  const pv=parseFloat(document.getElementById("p-inp").value);
  const qv=parseInt(document.getElementById("q-inp").value)||1;
  if(isNaN(pv)||pv<0){toast("Ingresa un precio válido");return}
  prices[pendCode]=pv;cart[pendCode]=qv;
  updBadge();closeOv();refreshCard(pendCode);
  toast("Producto agregado ✓");
}
function closeOv(){const o=document.getElementById("ov");if(o)o.remove()}

// ── TEXTO DEL PEDIDO ───────────────────────────────────────────────
function buildTxt(o){
  const line="=".repeat(32);
  let t=`PEDIDO ${o.id}\n`;
  t+=`Fecha: ${o.fecha}  Hora: ${o.hora}\n`;
  t+=line+"\n";
  t+=`Cliente: ${o.cliente}\n`;
  if(o.ruc)t+=`Ced/RUC: ${o.ruc}\n`;
  if(o.dir)t+=`Dir:     ${o.dir}\n`;
  if(o.tel)t+=`Tel:     ${o.tel}\n`;
  t+=line+"\n";
  t+="PRODUCTOS:\n\n";
  o.items.forEach((it,i)=>{
    t+=`${i+1}. [${it.code}] ${it.name}\n`;
    t+=`   Cant: ${it.qty}`;
    if(!o.sp)t+=`   Precio: $${it.price.toFixed(2)}   Sub: $${(it.price*it.qty).toFixed(2)}`;
    t+="\n";
  });
  t+="\n"+line+"\n";
  t+=`Total unidades: ${o.items.reduce((a,i)=>a+i.qty,0)}\n`;
  if(!o.sp)t+=`TOTAL: $${o.total.toFixed(2)}\n`;
  t+=line+"\n";
  return t;
}

function doWA(o,direct){
  const txt=buildTxt(o);
  const enc=encodeURIComponent(txt);
  let url;
  if(direct&&o.tel){
    const tel=o.tel.replace(/\D/g,"");
    const intl=tel.startsWith("593")?tel:tel.startsWith("0")?`593${tel.slice(1)}`:`593${tel}`;
    url=`https://wa.me/${intl}?text=${enc}`;
  }else{
    url=`https://wa.me/?text=${enc}`;
  }
  window.open(url,"_blank");
}
function doTXT(o){
  const blob=new Blob([buildTxt(o)],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`pedido-${o.id}.txt`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  toast("Archivo descargado ✓");
}
function doPDF(o){
  const txt=buildTxt(o);
  const esc=txt.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const h=`<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pedido ${o.id}</title>
  <style>body{font-family:monospace;font-size:13px;padding:16px;max-width:420px;margin:auto;line-height:1.6}
  pre{white-space:pre-wrap;word-break:break-word}
  .pbtn{display:block;width:100%;padding:12px;background:#0D2B5E;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:14px;text-align:center}
  @media print{.pbtn{display:none}}</style></head>
  <body><button class="pbtn" onclick="window.print()">Imprimir / Guardar PDF</button><pre>${esc}</pre></body></html>`;
  const blob=new Blob([h],{type:"text/html;charset=utf-8"});
  window.open(URL.createObjectURL(blob),"_blank");
}

  return{
    id:`ORD-${String(orders.length+1).padStart(3,"0")}`,
    cliente:document.getElementById("f-cli").value.trim()||"Cliente",
    ruc:document.getElementById("f-ruc").value.trim(),
    dir:document.getElementById("f-dir").value.trim(),
    tel:document.getElementById("f-tel").value.trim(),
    fecha:new Date().toLocaleDateString("es-EC"),
    hora:new Date().toLocaleTimeString("es-EC",{hour:"2-digit",minute:"2-digit"}),
    sp,
    items:Object.entries(cart).map(([c,q])=>{
      const p=PRODS.find(x=>x[0]===c);
      return{code:c,qty:q,price:prices[c]||0,name:p?p[2]:c};
    }),
    total:cTotal()||0
  };
}

function renderCart(){
  const items=Object.entries(cart);
  const sp=mode==="sin";
  document.getElementById("notice-sin").style.display=sp?"flex":"none";
  document.getElementById("ititle").textContent=`Productos (${items.length})`;
  const empty=document.getElementById("cempty");
  const body=document.getElementById("cbody");
  const actions=document.getElementById("cactions");
  if(!items.length){empty.style.display="block";body.innerHTML="";actions.style.display="none";return}
  empty.style.display="none";
  const tot=cTotal(),units=items.reduce((a,[,q])=>a+q,0);
  body.innerHTML=`<div class="icard">${items.map(([c,q])=>{
    const p=PRODS.find(x=>x[0]===c),nm=p?p[2]:c,pr=prices[c]||0;
    return `<div class="ir">
      <div class="iname">${nm}<span>${c}</span></div>
      <span class="iqty">x${q}</span>
      ${!sp?`<span class="isub">$${(pr*q).toFixed(2)}</span>`:""}
      <span class="idel" onclick="delItem('${c}')">&#10005;</span>
    </div>`;
  }).join("")}</div>
  <div class="tbar"><div class="tbar-l"><span>${sp?"Total unidades":"Total del pedido"}</span>
  <small>${units} unid. · ${items.length} prods.</small></div>
  <strong>${sp?`${units} und.`:`$${tot.toFixed(2)}`}</strong></div>`;

  actions.style.display="block";
  actions.innerHTML=`
    <button class="btn btn-teal" onclick="confirmar()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Confirmar pedido
    </button>
    <div class="agrid">
      <button class="btn btn-wa" style="font-size:13px;margin:0" onclick="showWAMod(curOrder())">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        WhatsApp
      </button>
      <button class="btn btn-gray" style="font-size:13px;margin:0" onclick="showExpMod(curOrder())">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar
      </button>
    </div>`;
}

function delItem(c){delete cart[c];delete prices[c];updBadge();renderCart()}

function showWAMod(o){
  const ov=document.createElement("div");ov.className="ov";ov.id="ov";
  ov.innerHTML=`<div class="ovc">
    <div class="ov-title">Enviar por WhatsApp</div>
    <div class="ov-sub" style="margin-bottom:14px">Elige a quién enviar el pedido</div>
    ${o.tel?`<button class="btn btn-wa" onclick="doWA(orders.find(x=>x.id==='${o.id}')||curOrder(),true);closeOv()">
      Enviar al cliente (${o.tel})</button>`:""}
    <button class="btn" style="background:#128C7E;color:#fff" onclick="doWA(orders.find(x=>x.id==='${o.id}')||curOrder(),false);closeOv()">
      Elegir contacto en WhatsApp</button>
    <button class="ov-cancel" onclick="closeOv()">Cancelar</button>
  </div>`;
  document.body.appendChild(ov);
}
function showExpMod(o){
  const ov=document.createElement("div");ov.className="ov";ov.id="ov";
  ov.innerHTML=`<div class="ovc">
    <div class="ov-title">Exportar pedido</div>
    <div class="ov-sub" style="margin-bottom:14px">${o.cliente} · ${o.items.length} productos</div>
    <button class="btn btn-navy" onclick="doTXT(orders.find(x=>x.id==='${o.id}')||curOrder());closeOv()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Descargar como .TXT
    </button>
    <button class="btn btn-red" onclick="doPDF(orders.find(x=>x.id==='${o.id}')||curOrder());closeOv()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Ver / Imprimir PDF
    </button>
    <button class="ov-cancel" onclick="closeOv()">Cancelar</button>
  </div>`;
  document.body.appendChild(ov);
}

function confirmar(){
  const cli=document.getElementById("f-cli").value.trim();
  if(!cli){toast("Ingresa el nombre del cliente");document.getElementById("f-cli").focus();return}
  if(!Object.keys(cart).length){toast("El carrito está vacío");return}
  const o=curOrder();
  orders.unshift(o);
  Object.keys(cart).forEach(k=>{delete cart[k];delete prices[k]});
  ["f-cli","f-ruc","f-dir","f-tel"].forEach(id=>document.getElementById(id).value="");
  updBadge();
  const ov=document.createElement("div");ov.className="ov";ov.id="ov";
  ov.innerHTML=`<div class="ovc">
    <div style="text-align:center;margin-bottom:16px">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#0E7C7B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 8px;display:block"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <div style="font-size:16px;font-weight:700;color:var(--text)">${o.id} confirmado</div>
      <div style="font-size:12px;color:var(--text2);margin-top:3px">${o.cliente} · ${o.items.length} prods. · ${o.items.reduce((a,i)=>a+i.qty,0)} unid.</div>
    </div>
    <button class="btn btn-wa" onclick="doWA(orders[0],true);closeOv()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      Enviar por WhatsApp
    </button>
    <div class="agrid">
      <button class="btn btn-navy" style="margin:0;font-size:13px" onclick="doTXT(orders[0]);closeOv()">Descargar .TXT</button>
      <button class="btn btn-red" style="margin:0;font-size:13px" onclick="doPDF(orders[0]);closeOv()">Ver PDF</button>
    </div>
    <button class="ov-cancel" onclick="closeOv();goTab('hist')">Ver historial</button>
  </div>`;
  document.body.appendChild(ov);
}

// ── HISTORIAL ──────────────────────────────────────────────────────
function renderHist(){
  const hoy=new Date().toLocaleDateString("es-EC");
  const hords=orders.filter(o=>o.fecha===hoy);
  const tv=hords.filter(o=>!o.sp).reduce((a,o)=>a+o.total,0);
  const tu=hords.reduce((a,o)=>a+o.items.reduce((b,i)=>b+i.qty,0),0);
  document.getElementById("kgrid").innerHTML=`
    <div class="kpi"><div class="kv">${hords.length}</div><div class="kl">Órdenes hoy</div></div>
    <div class="kpi"><div class="kv">$${tv.toFixed(0)}</div><div class="kl">Total vendido</div></div>
    <div class="kpi"><div class="kv">${tu}</div><div class="kl">Unidades</div></div>
    <div class="kpi"><div class="kv">${Math.round(hords.length/30*100)}%</div><div class="kl">Meta 30 ord.</div></div>`;
  const el=document.getElementById("hlist");
  if(!orders.length){
    el.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>Aún no hay pedidos registrados hoy.</p></div>`;
    return;
  }
  el.innerHTML=orders.map((o,i)=>`<div class="hcard">
    <div class="htop">
      <div>
        <div class="hcli">${o.cliente}</div>
        <div class="hmeta">${o.hora} · ${o.items.length} prod. · ${o.items.reduce((a,it)=>a+it.qty,0)} und.</div>
        ${o.dir?`<div class="hmeta">${o.dir}</div>`:""}
        <span class="hbadge">${o.id}</span>
      </div>
      <div style="text-align:right">
        ${!o.sp?`<div class="htot">$${o.total.toFixed(2)}</div>`:`<div style="font-size:13px;color:var(--text2)">${o.items.reduce((a,it)=>a+it.qty,0)} und.</div>`}
      </div>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:7px;margin-top:6px;margin-bottom:8px">
      ${o.items.slice(0,3).map(it=>`<div style="font-size:11px;color:var(--text2);padding:2px 0">[${it.code}] ${it.name.substring(0,38)}${it.name.length>38?"...":""}</div>`).join("")}
      ${o.items.length>3?`<div style="font-size:11px;color:var(--text2)">+${o.items.length-3} productos más</div>`:""}
    </div>
    <div class="hactions">
      <button class="hbtn" style="background:#25D366;color:#fff" onclick="showWAMod(orders[${i}])">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        WhatsApp
      </button>
      <button class="hbtn" style="background:#0D2B5E;color:#fff" onclick="doTXT(orders[${i}])">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        .TXT
      </button>
      <button class="hbtn" style="background:#C62828;color:#fff" onclick="doPDF(orders[${i}])">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        PDF
      </button>
    </div>
  </div>`).join("");
}

// ── INIT ───────────────────────────────────────────────────────────
renderChips();filterP();renderCart();renderHist();
</script>
</body>
